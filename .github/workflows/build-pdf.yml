name: Build Calendar PDF

# data/calendar-data.json が更新されたら自動でHTML→PDFを生成しcommitする。
# 手動実行（workflow_dispatch）も可能。

on:
  push:
    paths:
      - 'data/calendar-data.json'
      - 'scripts/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-pdf
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Build HTML
        run: node scripts/build.js

      - name: Generate PDF
        run: node scripts/make-pdf.js

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.html output/*.pdf
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "build: regenerate calendar PDF [skip ci]"
            git push
          fi
